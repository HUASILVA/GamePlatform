<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>游戏大厅</title>
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <header>
    <h1>游戏大厅</h1>
        <div>
            <span id="userInfo"></span>
            <button id="settingsBtn">设置</button>
            <button id="logoutBtn">退出登录</button>
        </div>
    </header>
    <div id="message"></div>
    <div class="games">
        <div class="game-card">
            <h3>猜数字</h3>
            <p>猜中随机数字，分数越高越好</p>
            <button onclick="location.href='guess.html'">开始游戏</button>
        </div>
        <div class="game-card">
            <h3>推箱子</h3>
            <p>经典推箱子，步数越少分越高</p>
            <button onclick="location.href='pushbox.html'">开始游戏</button>
        </div>
    </div>
    <!-- 排行榜区域 -->
    <div id="rankArea">
    <h3>猜数字排行榜</h3>
    <table id="rankTable" border="1" cellpadding="5" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>排名</th>
                <th>用户名</th>
                <th>最高分</th>
                <th>更新时间</th>
            </tr>
        </thead>
        <tbody id="rankBody">
            <tr><td colspan="4">加载中...</td></tr>
        </tbody>
    </table>
    </div>
    <script src="/js/index.js"></script>
</body>
</html>
